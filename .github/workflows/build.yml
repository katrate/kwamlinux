name: Build Kwamlinux ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install archiso
        run: pacman -Syu --noconfirm archiso git curl

      - name: Build Kwamlinux ISO
        run: |
          cp -r /usr/share/archiso/configs/releng/ /tmp/kwamlinux-profile

          PKGLIST=$(find . -name "packages.x86_64" | head -1)
          if [ -n "$PKGLIST" ]; then
            grep -v '^#' "$PKGLIST" | grep -v '^$' >> /tmp/kwamlinux-profile/packages.x86_64
          fi

          AIROOTFS=$(find . -type d -name "airootfs" | head -1)
          if [ -n "$AIROOTFS" ]; then
            cp -r "$AIROOTFS/." /tmp/kwamlinux-profile/airootfs/
          fi

          mkdir -p /tmp/kwamlinux-profile/airootfs/etc
          printf 'NAME="Kwamlinux"\nVERSION="1.0.0"\nID=kwamlinux\nID_LIKE=arch\nPRETTY_NAME="Kwamlinux Linux 1.0.0"\nBUILD_ID=rolling\n' > /tmp/kwamlinux-profile/airootfs/etc/os-release
          printf 'kwamlinux\n' > /tmp/kwamlinux-profile/airootfs/etc/hostname

          mkdir -p /tmp/kwamlinux-work /tmp/kwamlinux-out
          mkarchiso -v -w /tmp/kwamlinux-work -o /tmp/kwamlinux-out /tmp/kwamlinux-profile

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: KwamLinux-ISO
          path: /tmp/kwamlinux-out/*.iso
          retention-days: 30
