name: Build Kwamlinux ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update system & install archiso
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git curl sudo

      - name: Find and run build script
        run: |
          BUILD=$(find . -name "build.sh" | head -1)
          echo "Found: $BUILD"
          DIR=$(dirname "$BUILD")
          cd "$DIR"
          chmod +x build.sh
          # Remove sudo calls since we are already root
          sed -i 's/sudo //g' build.sh
          mkdir -p output
          bash build.sh

      - name: Collect ISO
        run: |
          mkdir -p /final
          find . -name "*.iso" -exec cp {} /final/ \;

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: KwamLinux-ISO
          path: /final/*.iso
          retention-days: 30
